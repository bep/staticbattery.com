baseURL      = "https://staticbattery.com/"
title        = "staticbattery.com"
disableKinds = ["section", "taxonomy", "term"]

[params]

    [params.gallerydeluxe]
        shuffle     = true
        reverse     = false
        enable_exif = false

    [params.minimalanalytics]
        # GA4 tracking ID
        tracking_id = "G-2LH12QQMRY"

[caches]
    [caches.images]
        dir    = ':cacheDir/gallerydeluxe'
        maxAge = "4320h"                   # 6 months.

[imaging]
    resampleFilter = "CatmullRom"
    quality        = 71
    anchor         = "smart"
    [imaging.exif]
        disableDate    = false
        disableLatLong = true
        includeFields  = 'Artist|LensModel|FNumber|ExposureTime'

[server]
    [[server.headers]]
        for = '/**'
        [server.headers.values]
            Referrer-Policy = 'strict-origin-when-cross-origin'

[module]
    [[module.mounts]]
        source = "assets"
        target = "assets"
    [[module.mounts]]
        source = "layouts"
        target = "layouts"
    [[module.mounts]]
        source = "content"
        target = "content"
    [[module.mounts]]
        source = "static"
        target = "static"
    [[module.mounts]]
        source = '/Users/bep/Pictures/Albums/Staticbattery'
        target = 'content/images'
    [[module.imports]]
        path = "github.com/bep/gallerydeluxe"
    [[module.imports]]
        path = "github.com/bep/hugo-mod-minimalanalytics"
